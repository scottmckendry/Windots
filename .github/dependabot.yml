version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      nix-inputs:
        patterns:
          - "*"
    commit-message:
      prefix: "system update"
